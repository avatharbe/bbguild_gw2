services:
    avathar.bbguild_gw2.installer:
        class: avathar\bbguild_gw2\game\gw2_installer
        arguments:
            - '@dbal.conn'
            - '@cache.driver'
            - '@config'
            - '@user'

    avathar.bbguild_gw2.provider:
        class: avathar\bbguild_gw2\game\gw2_provider
        arguments:
            - '@avathar.bbguild_gw2.installer'
            - '@ext.manager'
        tags:
            - { name: bbguild.game_provider }
